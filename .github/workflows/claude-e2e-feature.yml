name: Claude E2E Feature

# Flujo agéntico end-to-end (human-in-the-loop):
# Abres el issue y NO pasa nada. Cuando le añades la etiqueta "e2e", arranca:
# implementa -> prueba con Playwright (graba video) -> abre PR -> reporta -> sube el video.
#
# El disparador por etiqueta no choca con claude.yml (que no escucha el evento `labeled`).

on:
  issues:
    types: [labeled]

jobs:
  e2e-feature:
    if: github.event.label.name == 'e2e'
    runs-on: ubuntu-latest
    permissions:
      contents: write        # crear rama y commitear
      pull-requests: write   # abrir el PR y comentar
      issues: write          # responder en el issue
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Claude Code (implement + test + open PR)
        id: claude
        uses: anthropics/claude-code-action@v1
        env:
          # Variables que la app necesita para levantar `pnpm dev` en CI.
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_APP_URL: http://localhost:3000
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          claude_args: '--allowed-tools "Bash,Read,Write,Edit,Glob,Grep"'
          prompt: |
            Un humano te asignó este trabajo poniéndole la etiqueta "e2e" al issue
            #${{ github.event.issue.number }} ("${{ github.event.issue.title }}").

            El cuerpo del issue describe un feature a implementar. Ejecuta TODO este ciclo
            sin pedir confirmación, ya que corres en CI sin un humano disponible:

            1. IMPLEMENTAR
               - Lee /specs/ primero (metodología SDD del proyecto). Si no hay spec para
                 este feature, crea uno breve en /specs/ antes de codear.
               - Lee la guía relevante en node_modules/next/dist/docs/ antes de escribir
                 código Next.js (este proyecto usa una versión con breaking changes).
               - Crea una rama nueva: feat/issue-${{ github.event.issue.number }}.
               - Implementa el feature descrito en el issue.

            2. PROBAR (E2E) — DEJAR EN VERDE
               - Añade un nuevo spec en e2e/ que ejercite el GOLDEN PATH del feature
                 (navega, interactúa, y haz asserts visibles).
               - Corre `pnpm test:e2e`. Si falla, ARREGLA el código o el test hasta que pase.
               - Corre también `pnpm lint` y `pnpm test` (unit) y deja todo en verde.
               - NO te preocupes por grabar o subir el video: un step posterior del
                 workflow re-corre `pnpm test:e2e` y graba el .webm de forma confiable.
                 Tu única responsabilidad aquí es que los specs estén en VERDE.

            3. ABRIR PR
               - Commitea tu trabajo y abre un PR contra main con `gh pr create`.
               - El cuerpo del PR debe cerrar el issue con "Closes #${{ github.event.issue.number }}".

            4. REPORTAR en el PR (comentario con `gh pr comment`)
               Reporta SOLO lo que hiciste, sin inventar resultados de tests:
                 - Qué feature se implementó y qué archivos cambiaron.
                 - Qué specs e2e añadiste y qué golden path ejercitan.
                 - Cualquier limitación o supuesto que hayas tomado.
               NO afirmes cuántos tests pasaron ni menciones el video: un step
               posterior del workflow publica el resultado real de los tests y el
               link al artifact del video en un comentario aparte.

            Reglas: no hagas force-push, no borres ramas ajenas, no toques otros workflows.

      # A partir de aquí, steps determinísticos: el video y el resultado de los
      # tests los produce el workflow, NO el agente — así son reales y verificables.

      - name: Checkout PR branch
        run: |
          BRANCH="feat/issue-${{ github.event.issue.number }}"
          git fetch origin "$BRANCH"
          git checkout "$BRANCH"

      - name: Reinstall deps for PR branch
        run: pnpm install --frozen-lockfile

      - name: Run E2E and record video
        id: e2e
        env:
          CI: "true"
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_APP_URL: http://localhost:3000
        run: |
          set -o pipefail
          pnpm test:e2e 2>&1 | tee e2e-output.txt
        # Si los tests fallan, el job falla (rojo) — señal honesta de que algo
        # quedó roto. Los steps de abajo igual corren gracias a `if: always()`.

      - name: List recorded artifacts (debug)
        if: always()
        run: |
          echo "=== e2e/.results ==="
          ls -laR e2e/.results 2>/dev/null || echo "(vacío)"
          echo "=== .webm encontrados ==="
          find e2e/.results -name '*.webm' 2>/dev/null || echo "(ninguno)"

      - name: Upload E2E video & report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-video
          path: |
            e2e/.results/**
            e2e/.report/**
          if-no-files-found: warn
          retention-days: 14

      - name: Comment test result + video link on PR
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR=$(gh pr list --head "feat/issue-${{ github.event.issue.number }}" --json number --jq '.[0].number')
          if [ -z "$PR" ]; then echo "No PR found, skipping comment"; exit 0; fi

          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          if [ "${{ steps.e2e.outcome }}" = "success" ]; then
            STATUS="✅ **E2E en verde**"
          else
            STATUS="❌ **E2E en rojo** — revisa el log de la corrida"
          fi
          VIDEOS=$(find e2e/.results -name '*.webm' 2>/dev/null | wc -l | tr -d ' ')

          {
            echo "## Reporte de tests (generado por el workflow)"
            echo ""
            echo "$STATUS"
            echo ""
            echo "- Videos \`.webm\` grabados: **$VIDEOS**"
            echo "- Artifact descargable: **e2e-video** en [esta corrida]($RUN_URL)"
            echo ""
            echo "_Resultado producido por un step determinístico del workflow corriendo \`pnpm test:e2e\` sobre la rama del PR — no por el agente._"
          } > pr-comment.md

          gh pr comment "$PR" --body-file pr-comment.md
